name: Monitor 3

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: |
          npm install
          npx playwright install --with-deps

      - run: node index.js
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
