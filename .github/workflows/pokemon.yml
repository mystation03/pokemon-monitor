name: Pokemon Center Monitor

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: node pokemon.js
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
